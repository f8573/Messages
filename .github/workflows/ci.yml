name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run OpenAPI validator
        env:
          OPENAPI_SPEC: ohmf/packages/protocol/openapi/openapi.yaml
        run: |
          echo "Running OpenAPI validator"
          cd tools/validate_openapi || exit 1
          go run . -spec ../../${OPENAPI_SPEC}

      - name: Run unit tests (ohmf module)
        run: |
          cd ohmf
          go test ./... -v

      - name: Build docker images
        run: |
          docker compose build --pull

      - name: Run containerized integration test
        run: |
          # Run the dedicated itest service inside the compose network.
          docker compose up --build --abort-on-container-exit --exit-code-from itest itest

      - name: Collect docker-compose logs on failure
        if: failure()
        run: |
          mkdir -p ci-logs
          docker compose logs > ci-logs/docker-compose.log || true
        continue-on-error: true

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: ci-logs

      - name: Teardown
        if: always()
        run: |
          docker compose down -v
name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services: {}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.x'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run unit tests (ohmf module)
        run: |
          cd ohmf
          go test ./... -v

      - name: Build docker images
        run: |
          docker-compose build --pull

      - name: Start services
        run: |
          docker-compose up -d

      - name: Wait for gateway health
        run: |
          echo "Waiting for gateway..."
          for i in {1..30}; do
            if curl -fsS "http://localhost:8080/healthz" >/dev/null 2>&1; then
              echo gateway healthy
              exit 0
            fi
            sleep 2
          done
          echo "gateway did not become healthy" >&2
          exit 1

      - name: Run integration tests
        env:
          INTEGRATION: 1
        run: |
          go test ./ohmf/integration -v

      - name: Collect docker-compose logs on failure
        if: failure()
        run: |
          mkdir -p ci-logs
          docker-compose logs > ci-logs/docker-compose.log || true
        continue-on-error: true

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: ci-logs

      - name: Teardown
        if: always()
        run: |
          docker-compose down -v

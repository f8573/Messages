<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self' http://localhost:18080 http://127.0.0.1:18080; object-src 'none'; base-uri 'none'; form-action 'self'" />
    <meta name="referrer" content="no-referrer" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()" />
    <title>OHMF Messages</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-layer"></div>
    <section class="auth-shell" id="auth-shell">
      <div class="auth-card">
        <h1>Sign in to OHMF</h1>
        <p class="auth-muted">Choose your country code and enter your number. In local dev, OTP is <code>123456</code>.</p>
        <p class="status-msg" id="auth-status" role="status" aria-live="polite"></p>

        <form id="phone-start-form">
          <label for="country-code-select">Phone Number</label>
          <div class="phone-grid">
            <select id="country-code-select" name="countryCode" aria-label="Country code">
              <option value="+1">+1 (US/Canada)</option>
              <option value="+44">+44 (UK)</option>
              <option value="+61">+61 (Australia)</option>
              <option value="+91">+91 (India)</option>
              <option value="+81">+81 (Japan)</option>
            </select>
            <input id="phone-input" name="phone" type="tel" inputmode="numeric" placeholder="(555)-123-4567" required />
          </div>
          <p class="auth-muted tiny" id="phone-e164-preview"></p>
          <button type="submit" class="send-btn full">Send OTP</button>
        </form>

        <form id="phone-verify-form" class="hidden">
          <label for="otp-input">OTP Code</label>
          <input id="otp-input" name="otp" type="text" inputmode="numeric" maxlength="6" placeholder="123456" required />
          <button type="submit" class="send-btn full">Verify and Continue</button>
        </form>
      </div>
    </section>

    <div class="app-shell hidden" id="app-shell">
      <aside class="sidebar" id="sidebar">
        <header class="sidebar-header">
          <h1>Messages</h1>
          <div class="header-actions">
            <button class="icon-btn" id="new-chat-btn" aria-label="New conversation">+</button>
            <button class="icon-btn" id="logout-btn" aria-label="Logout">x</button>
          </div>
        </header>
        <form class="new-chat-form hidden" id="new-chat-form">
          <label for="new-phone-input">Start new message</label>
          <div class="row">
            <select id="new-country-code-select" aria-label="New chat country code">
              <option value="+1">+1</option>
              <option value="+44">+44</option>
              <option value="+61">+61</option>
              <option value="+91">+91</option>
              <option value="+81">+81</option>
            </select>
            <input id="new-phone-input" type="tel" inputmode="numeric" placeholder="(555)-123-4567" />
            <button type="submit" class="send-btn compact">Start</button>
          </div>
        </form>
        <div class="search-wrap">
          <input id="search-input" type="search" placeholder="Search conversations" />
        </div>
        <ul class="thread-list" id="thread-list"></ul>
      </aside>

      <main class="chat" id="chat">
        <header class="chat-header">
          <button class="back-btn" id="back-btn" aria-label="Back">Back</button>
          <div class="chat-title-wrap">
            <p class="chat-title" id="chat-title">Select a conversation</p>
            <p class="chat-subtitle" id="chat-subtitle">No active thread</p>
          </div>
          <div class="chat-actions">
            <button class="icon-btn" id="nickname-btn" aria-label="Set nickname">Aa</button>
            <button class="icon-btn" id="block-btn" aria-label="Block user">Block</button>
            <button class="icon-btn" id="close-thread-btn" aria-label="Close conversation">Close</button>
          </div>
        </header>

        <section class="message-list" id="message-list">
          <div class="empty-state" id="empty-state">
            <h2>Start chatting</h2>
            <p>Pick a conversation or start a new one with a phone number.</p>
          </div>
        </section>

        <form class="composer" id="composer">
          <input
            id="composer-input"
            type="text"
            placeholder="Message"
            autocomplete="off"
            maxlength="1000"
          />
          <button type="submit" class="send-btn">Send</button>
        </form>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>

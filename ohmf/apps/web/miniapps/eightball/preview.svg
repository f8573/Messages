<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Mystic 8-Ball preview</title>
  <desc id="desc">A dark 8-ball with a glowing answer window.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="70%">
      <stop offset="0%" stop-color="#315f7f"/>
      <stop offset="45%" stop-color="#10202d"/>
      <stop offset="100%" stop-color="#05070c"/>
    </radialGradient>
    <linearGradient id="window" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ed4ff"/>
      <stop offset="100%" stop-color="#275cbe"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="#091017"/>
  <circle cx="256" cy="256" r="188" fill="url(#bg)"/>
  <circle cx="205" cy="180" r="54" fill="rgba(255,255,255,0.12)"/>
  <path d="M256 177l102 176H154z" fill="url(#window)"/>
  <text x="256" y="246" fill="#eaf8ff" font-size="38" font-family="Trebuchet MS, Verdana, sans-serif" text-anchor="middle">ASK</text>
  <text x="256" y="286" fill="#eaf8ff" font-size="38" font-family="Trebuchet MS, Verdana, sans-serif" text-anchor="middle">AGAIN</text>
</svg>

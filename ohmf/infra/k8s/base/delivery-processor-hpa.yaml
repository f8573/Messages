apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ohmf-delivery-processor
  namespace: ohmf-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ohmf-delivery-processor
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

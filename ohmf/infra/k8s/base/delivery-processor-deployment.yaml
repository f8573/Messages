apiVersion: apps/v1
kind: Deployment
metadata:
  name: ohmf-delivery-processor
  namespace: ohmf-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: delivery-processor
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: delivery-processor
        app.kubernetes.io/component: worker
    spec:
      priorityClassName: ohmf-workers-medium
      nodeSelector:
        ohmf.node-role: app
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: delivery-processor
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: delivery-processor
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: delivery-processor
      containers:
        - name: delivery-processor
          image: ohmf-delivery-processor:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: ohmf-processors-config
            - secretRef:
                name: ohmf-app-secrets
          env:
            - name: APP_KAFKA_GROUP_ID
              value: delivery-processor-v1
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"

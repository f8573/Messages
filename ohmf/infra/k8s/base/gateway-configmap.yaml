apiVersion: v1
kind: ConfigMap
metadata:
  name: ohmf-gateway-config
  namespace: ohmf-app
data:
  APP_ENV: perf
  APP_ADDR: :8080
  APP_LOG_LEVEL: info
  APP_ACCESS_TTL_MINUTES: "15"
  APP_REFRESH_TTL_HOURS: "720"
  APP_OTP_START_WINDOW_MINUTES: "10"
  APP_OTP_START_PER_PHONE_LIMIT: "5"
  APP_OTP_START_PER_IP_LIMIT: "20"
  APP_OTP_START_PER_SUBNET_LIMIT: "100"
  APP_OTP_VERIFY_WINDOW_MINUTES: "10"
  APP_OTP_VERIFY_PER_CHALLENGE_LIMIT: "10"
  APP_OTP_VERIFY_PER_IP_LIMIT: "50"
  APP_OTP_VERIFY_PER_DEVICE_LIMIT: "10"
  APP_OTP_VERIFY_PER_PHONE_LIMIT: "10"
  APP_WS_CONNECT_WINDOW_SECONDS: "60"
  APP_WS_CONNECT_PER_IP_LIMIT: "60"
  APP_WS_CONNECT_BURST: "120"
  APP_SEND_RATE_WINDOW_SECONDS: "10"
  APP_SEND_RATE_PER_USER: "30"
  APP_SEND_RATE_USER_BURST: "60"
  APP_SEND_RATE_PER_CONVERSATION: "300"
  APP_SEND_RATE_CONVERSATION_BURST: "500"
  APP_SEND_RATE_PER_IP: "120"
  APP_SEND_RATE_IP_BURST: "240"
  APP_USE_KAFKA_SEND: "true"
  APP_USE_CASSANDRA_READS: "false"
  APP_ENABLE_WS_SEND: "true"
  APP_KAFKA_CLIENT_ID: ohmf-gateway
  APP_KAFKA_INGRESS_TOPIC: msg.ingress.v1
  APP_KAFKA_PERSISTED_TOPIC: msg.persisted.v1
  APP_KAFKA_DELIVERY_TOPIC: msg.delivery.v1
  APP_KAFKA_SMS_DISPATCH_TOPIC: msg.sms.dispatch.v1
  APP_KAFKA_PRESENCE_TOPIC: presence.events.v1
  APP_KAFKA_MICROSERVICE_TOPIC: microservice.events.v1
  APP_ACK_TIMEOUT_MS: "2000"

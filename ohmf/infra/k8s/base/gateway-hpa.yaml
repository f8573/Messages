apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ohmf-gateway
  namespace: ohmf-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ohmf-gateway
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75

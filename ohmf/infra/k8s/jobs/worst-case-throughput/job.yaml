apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ohmf-worst-case-throughput-reports
  namespace: ohmf-loadgen
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ohmf-worst-case-throughput
  namespace: ohmf-loadgen
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ohmf-worst-case-throughput
        app.kubernetes.io/component: loadgen
    spec:
      restartPolicy: Never
      priorityClassName: ohmf-loadgen-low
      nodeSelector:
        ohmf.node-role: loadgen
      containers:
        - name: loadgen
          image: ohmf-stress:dev
          imagePullPolicy: IfNotPresent
          command:
            - node
            - ./testing/stress/run.js
          args:
            - --scenario
            - throughput
            - --total-clients
            - "1000"
            - --unique-user-ratio
            - "0.75"
            - --active-conversations
            - "250"
            - --messages
            - "600"
            - --rate
            - "120"
            - --send-concurrency
            - "8"
            - --settle-timeout-ms
            - "60000"
            - --post-connect-settle-ms
            - "5000"
            - --report-dir
            - /var/reports
          env:
            - name: OHMF_STRESS_BASE_URL
              value: http://ohmf-gateway.ohmf-app.svc.cluster.local:8080
            - name: OHMF_STRESS_METRICS_URLS
              value: http://ohmf-gateway.ohmf-app.svc.cluster.local:8080/metrics
            - name: OHMF_STRESS_RUN_LABEL
              value: k8s-worst-case-throughput
          resources:
            requests:
              cpu: "4"
              memory: "8Gi"
            limits:
              cpu: "8"
              memory: "16Gi"
          volumeMounts:
            - name: reports
              mountPath: /var/reports
      volumes:
        - name: reports
          persistentVolumeClaim:
            claimName: ohmf-worst-case-throughput-reports

apiVersion: batch/v1
kind: Job
metadata:
  name: ohmf-standard-throughput
  namespace: ohmf-loadgen
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ohmf-standard-throughput
        app.kubernetes.io/component: loadgen
    spec:
      restartPolicy: Never
      priorityClassName: ohmf-loadgen-low
      nodeSelector:
        ohmf.node-role: loadgen
      containers:
        - name: loadgen
          image: ohmf-stress:dev
          imagePullPolicy: IfNotPresent
          command:
            - node
            - ./testing/stress/run.js
          args:
            - --scenario
            - throughput
            - --total-clients
            - "2500"
            - --unique-user-ratio
            - "0.75"
            - --active-conversations
            - "120"
            - --messages
            - "180"
            - --rate
            - "2.5"
            - --send-concurrency
            - "3"
            - --report-dir
            - /var/reports
          env:
            - name: OHMF_STRESS_BASE_URL
              value: http://ohmf-gateway.ohmf-app.svc.cluster.local:8080
            - name: OHMF_STRESS_METRICS_URLS
              value: http://ohmf-gateway.ohmf-app.svc.cluster.local:8080/metrics
            - name: OHMF_STRESS_RUN_LABEL
              value: k8s-standard-throughput
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          volumeMounts:
            - name: reports
              mountPath: /var/reports
      volumes:
        - name: reports
          emptyDir: {}

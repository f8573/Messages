services:
  client:
    image: python:3.12-alpine
    container_name: ohmf-client
    working_dir: /app
    volumes:
      - ../../apps/web:/app:ro
    environment:
      CLIENT_PORT: ${CLIENT_PORT:-5173}
    command:
      - sh
      - -c
      - python ./dev_server.py
    ports:
      - "${CLIENT_PORT:-5173}:${CLIENT_PORT:-5173}"
    depends_on:
      api:
        condition: service_started

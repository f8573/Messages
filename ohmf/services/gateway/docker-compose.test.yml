version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: ohmf-postgres-test
    environment:
      POSTGRES_USER: ohmf
      POSTGRES_PASSWORD: ohmf
      POSTGRES_DB: ohmf
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ohmf -d ohmf"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ohmf-network

  redis:
    image: redis:7-alpine
    container_name: ohmf-redis-test
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ohmf-network

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ohmf-gateway-test
    environment:
      APP_DB_DSN: "postgres://ohmf:ohmf@postgres:5432/ohmf?sslmode=disable"
      APP_REDIS_URL: "redis://redis:6379"
      APP_LOG_LEVEL: "debug"
      APP_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ohmf-network
    command: /bin/api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  ohmf-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local

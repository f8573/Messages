openapi: 3.0.3
info:
  title: OHMF MVP API
  version: 1.0.0
servers:
  - url: http://localhost:18081
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorEnvelope:
      type: object
      required: [code, message, request_id]
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
        details:
          type: object
          additionalProperties: true
    PhoneStartRequest:
      type: object
      required: [phone_e164, channel]
      properties:
        phone_e164: { type: string }
        channel: { type: string, enum: [SMS] }
    PhoneStartResponse:
      type: object
      properties:
        challenge_id: { type: string }
        expires_in_sec: { type: integer }
        retry_after_sec: { type: integer }
        otp_strategy: { type: string }
    PhoneVerifyRequest:
      type: object
      required: [challenge_id, otp_code, device]
      properties:
        challenge_id: { type: string }
        otp_code: { type: string }
        device:
          type: object
          properties:
            platform: { type: string }
            device_name: { type: string }
            push_token: { type: string }
            public_key: { type: string }
            capabilities:
              type: array
              items: { type: string }
    TokenPair:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
    CreateConversationRequest:
      type: object
      required: [type, participants]
      properties:
        type: { type: string, enum: [DM] }
        participants:
          type: array
          items: { type: string }
        transport_policy: { type: string, default: AUTO }
    SendMessageRequest:
      type: object
      required: [conversation_id, idempotency_key, content_type, content]
      properties:
        conversation_id: { type: string }
        idempotency_key: { type: string }
        content_type: { type: string }
        content:
          type: object
          additionalProperties: true
        client_generated_id: { type: string }
    SendPhoneMessageRequest:
      type: object
      required: [phone_e164, idempotency_key, content_type, content]
      properties:
        phone_e164: { type: string }
        idempotency_key: { type: string }
        content_type: { type: string }
        content:
          type: object
          additionalProperties: true
    SMSDeliveryStatus:
      type: string
      enum: [SENT, FAIL_SEND]
    OHMFDeliveryStatus:
      type: string
      enum: [SENT, DELIVERED, READ, FAIL_DELIVERY, FAIL_SEND]
    SendMessageResponse:
      type: object
      required: [message_id, server_order, transport, status, queued]
      properties:
        message_id: { type: string }
        server_order: { type: integer }
        transport: { type: string, enum: [OHMF] }
        status: { $ref: '#/components/schemas/OHMFDeliveryStatus' }
        queued: { type: boolean }
        ack_timeout_ms: { type: integer, nullable: true }
    SendPhoneMessageResponse:
      type: object
      required: [message_id, conversation_id, server_order, transport, status, queued]
      properties:
        message_id: { type: string }
        conversation_id: { type: string }
        server_order: { type: integer }
        transport: { type: string, enum: [SMS] }
        status: { $ref: '#/components/schemas/SMSDeliveryStatus' }
        queued: { type: boolean }
        ack_timeout_ms: { type: integer, nullable: true }
    MiniAppParticipant:
      type: object
      required: [user_id, role]
      properties:
        user_id: { type: string }
        role: { type: string }
        display_name: { type: string }
    MiniAppManifestEnvelope:
      type: object
      required: [id, manifest]
      properties:
        id: { type: string }
        owner_user_id: { type: string }
        manifest:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    MiniAppSessionState:
      type: object
      properties:
        snapshot:
          type: object
          additionalProperties: true
        session_storage:
          type: object
          additionalProperties: true
        shared_conversation_storage:
          type: object
          additionalProperties: true
        projected_messages:
          type: array
          items:
            type: object
            additionalProperties: true
    MiniAppLaunchContext:
      type: object
      properties:
        app_id: { type: string }
        app_session_id: { type: string }
        conversation_id: { type: string }
        viewer: { $ref: '#/components/schemas/MiniAppParticipant' }
        participants:
          type: array
          items: { $ref: '#/components/schemas/MiniAppParticipant' }
        capabilities_granted:
          type: array
          items: { type: string }
        state_snapshot:
          type: object
          additionalProperties: true
        state_version: { type: integer }
        consent_required: { type: boolean }
        joinable: { type: boolean }
    MiniAppCardContent:
      type: object
      properties:
        card_version: { type: integer }
        share_mode: { type: string, enum: [shared_session] }
        app_id: { type: string }
        manifest_id: { type: string }
        app_session_id: { type: string }
        title: { type: string }
        summary: { type: string }
        icon_url: { type: string }
        cta_label: { type: string }
        joinable: { type: boolean }
    MiniAppSession:
      type: object
      properties:
        app_session_id: { type: string }
        manifest_id: { type: string }
        app_id: { type: string }
        conversation_id: { type: string }
        viewer: { $ref: '#/components/schemas/MiniAppParticipant' }
        participants:
          type: array
          items: { $ref: '#/components/schemas/MiniAppParticipant' }
        capabilities_granted:
          type: array
          items: { type: string }
        participant_permissions:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
        state: { $ref: '#/components/schemas/MiniAppSessionState' }
        state_version: { type: integer }
        launch_context: { $ref: '#/components/schemas/MiniAppLaunchContext' }
        consent_required: { type: boolean }
        joinable: { type: boolean }
        ended_at:
          type: string
          format: date-time
    MiniAppRegisterRequest:
      type: object
      required: [manifest]
      properties:
        manifest:
          type: object
          additionalProperties: true
    MiniAppCreateSessionRequest:
      type: object
      required: [conversation_id]
      properties:
        manifest_id: { type: string }
        app_id: { type: string }
        conversation_id: { type: string }
        viewer: { $ref: '#/components/schemas/MiniAppParticipant' }
        participants:
          type: array
          items: { $ref: '#/components/schemas/MiniAppParticipant' }
        capabilities_granted:
          type: array
          items: { type: string }
        state_snapshot:
          type: object
          additionalProperties: true
        ttl_seconds: { type: integer }
        resume_existing: { type: boolean }
    MiniAppJoinSessionRequest:
      type: object
      properties:
        capabilities_granted:
          type: array
          items: { type: string }
    MiniAppShareRequest:
      type: object
      required: [conversation_id]
      properties:
        manifest_id: { type: string }
        app_id: { type: string }
        conversation_id: { type: string }
        capabilities_granted:
          type: array
          items: { type: string }
        state_snapshot:
          type: object
          additionalProperties: true
        resume_existing: { type: boolean }
    MiniAppShareResponse:
      type: object
      properties:
        message:
          type: object
          properties:
            message_id: { type: string }
            conversation_id: { type: string }
            sender_user_id: { type: string }
            content_type: { type: string, enum: [app_card] }
            content: { $ref: '#/components/schemas/MiniAppCardContent' }
            transport: { type: string }
            server_order: { type: integer }
            created_at:
              type: string
              format: date-time
            status: { type: string }
        app_session_id: { type: string }
        manifest_id: { type: string }
        app_id: { type: string }
        capabilities_granted:
          type: array
          items: { type: string }
        launch_context: { $ref: '#/components/schemas/MiniAppLaunchContext' }
        state: { $ref: '#/components/schemas/MiniAppSessionState' }
        state_version: { type: integer }
    MiniAppAppendEventRequest:
      type: object
      required: [event_name]
      properties:
        event_name: { type: string }
        body:
          type: object
          additionalProperties: true
    MiniAppSnapshotRequest:
      type: object
      properties:
        state:
          type: object
          additionalProperties: true
        state_version: { type: integer }
security:
  - bearerAuth: []
paths:
  /v1/auth/phone/start:
    post:
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PhoneStartRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PhoneStartResponse' }
  /v1/auth/phone/verify:
    post:
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PhoneVerifyRequest' }
      responses:
        '200':
          description: OK
  /v1/auth/refresh:
    post:
      security: []
      responses:
        '200':
          description: OK
  /v1/auth/logout:
    post:
      responses:
        '204':
          description: No Content
  /v1/conversations:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateConversationRequest' }
      responses:
        '201':
          description: Created
    get:
      responses:
        '200':
          description: OK
  /v1/conversations/{id}:
    get:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
  /v1/messages:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SendMessageRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SendMessageResponse' }
        '202':
          description: Accepted and queued for persistence
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SendMessageResponse' }
  /v1/messages/phone:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SendPhoneMessageRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SendPhoneMessageResponse' }
        '202':
          description: Accepted and queued for persistence
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SendPhoneMessageResponse' }
  /v1/ws:
    get:
      summary: WebSocket gateway endpoint
      description: >
        Upgrade this request to WebSocket. Authenticate with `access_token` query parameter
        or `Authorization: Bearer <token>` header during upgrade handshake.
      parameters:
        - in: query
          name: access_token
          required: false
          schema: { type: string }
      responses:
        '101':
          description: Switching Protocols
  /v1/conversations/{id}/messages:
    get:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
  /v1/conversations/{id}/read:
    post:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '204':
          description: No Content
  /v1/apps/register:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MiniAppRegisterRequest' }
      responses:
        '201':
          description: Created
  /v1/apps:
    get:
      responses:
        '200':
          description: OK
  /v1/apps/{appID}:
    get:
      parameters:
        - in: path
          name: appID
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
  /v1/apps/sessions:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MiniAppCreateSessionRequest' }
      responses:
        '200':
          description: OK
        '201':
          description: Created
  /v1/apps/sessions/{id}:
    get:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
    delete:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '204':
          description: No Content
  /v1/apps/sessions/{id}/join:
    post:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MiniAppJoinSessionRequest' }
      responses:
        '200':
          description: OK
  /v1/apps/sessions/{id}/events:
    post:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MiniAppAppendEventRequest' }
      responses:
        '201':
          description: Created
  /v1/apps/sessions/{id}/snapshot:
    post:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MiniAppSnapshotRequest' }
      responses:
        '200':
          description: OK
  /v1/apps/shares:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MiniAppShareRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MiniAppShareResponse' }

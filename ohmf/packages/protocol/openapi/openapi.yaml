openapi: 3.0.3
info:
  title: OHMF MVP API
  version: 1.0.0
servers:
  - url: http://localhost:18080
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorEnvelope:
      type: object
      required: [code, message, request_id]
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
        details:
          type: object
          additionalProperties: true
    PhoneStartRequest:
      type: object
      required: [phone_e164, channel]
      properties:
        phone_e164: { type: string }
        channel: { type: string, enum: [SMS] }
    PhoneStartResponse:
      type: object
      properties:
        challenge_id: { type: string }
        expires_in_sec: { type: integer }
        retry_after_sec: { type: integer }
        otp_strategy: { type: string }
    PhoneVerifyRequest:
      type: object
      required: [challenge_id, otp_code, device]
      properties:
        challenge_id: { type: string }
        otp_code: { type: string }
        device:
          type: object
          properties:
            platform: { type: string }
            device_name: { type: string }
            push_token: { type: string }
            public_key: { type: string }
    TokenPair:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
    VerifyPhoneResponse:
      type: object
      required: [user, device, tokens]
      properties:
        user:
          type: object
          required: [user_id]
          properties:
            user_id: { type: string }
            primary_phone_e164: { type: string }
        device:
          type: object
          required: [device_id]
          properties:
            device_id: { type: string }
            platform: { type: string }
        tokens:
          $ref: '#/components/schemas/TokenPair'
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }
    CreateConversationRequest:
      type: object
      required: [type, participants]
      properties:
        type: { type: string, enum: [DM] }
        participants:
          type: array
          items: { type: string }
        transport_policy: { type: string, default: AUTO }
    SendMessageRequest:
      type: object
      required: [conversation_id, idempotency_key, content_type, content]
      properties:
        conversation_id: { type: string }
        idempotency_key: { type: string }
        content_type: { type: string }
        content:
          type: object
          additionalProperties: true
        client_generated_id: { type: string }
    SendPhoneMessageRequest:
      type: object
      required: [phone_e164, idempotency_key, content_type, content]
      properties:
        phone_e164: { type: string }
        idempotency_key: { type: string }
        content_type: { type: string }
        content:
          type: object
          additionalProperties: true
    SMSDeliveryStatus:
      type: string
      enum: [SENT, FAIL_SEND]
    OHMFDeliveryStatus:
      type: string
      enum: [SENT, DELIVERED, READ, FAIL_DELIVERY, FAIL_SEND]
    SendMessageResponse:
      type: object
      required: [message_id, server_order, transport, status, queued]
      properties:
        message_id: { type: string }
        server_order: { type: integer }
        transport:
          type: string
          enum: [OHMF]
          description: "API-facing transport value; handler normalizes internal transport names (e.g. OTT) to this API enum (OHMF)."
        status: { $ref: '#/components/schemas/OHMFDeliveryStatus' }
        queued: { type: boolean }
        ack_timeout_ms: { type: integer, nullable: true }
    SendPhoneMessageResponse:
      type: object
      required: [message_id, conversation_id, server_order, transport, status, queued]
      properties:
        message_id: { type: string }
        conversation_id: { type: string }
        server_order: { type: integer }
        transport: { type: string, enum: [SMS] }
        status: { $ref: '#/components/schemas/SMSDeliveryStatus' }
        queued: { type: boolean }
        ack_timeout_ms: { type: integer, nullable: true }
    CarrierMessage:
      type: object
      properties:
        id: { type: string }
        device_id: { type: string }
        thread_key: { type: string }
        carrier_message_id: { type: string }
        direction: { type: string }
        transport: { type: string }
        text: { type: string }
        media_json:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        device_authoritative: { type: boolean }
        server_message_id:
          type: string
          nullable: true
        raw_payload:
          type: object
          additionalProperties: true
    CarrierLinkRequest:
      type: object
      required: [server_message_id]
      properties:
        server_message_id: { type: string }
    CarrierMessageLinkAudit:
      type: object
      properties:
        id: { type: string }
        carrier_message_id: { type: string }
        server_message_id: { type: string, nullable: true }
        set_at:
          type: string
          format: date-time
        actor: { type: string }
security:
  - bearerAuth: []
paths:
  /v1/auth/phone/start:
    post:
      summary: Start phone verification (send OTP)
      operationId: StartPhoneVerification
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PhoneStartRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PhoneStartResponse' }
  /v1/auth/phone/verify:
    post:
      summary: Verify phone OTP and create device session
      operationId: VerifyPhoneOTP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PhoneVerifyRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VerifyPhoneResponse' }
  /v1/auth/refresh:
    post:
      summary: Refresh access and refresh tokens using a refresh token
      operationId: RefreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
  /v1/auth/logout:
    post:
      summary: Logout current device/session
      operationId: Logout
      responses:
        '204':
          description: No Content
  /v1/carrier/messages/{id}/link:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Link a carrier message to a server message
      operationId: LinkCarrierMessage
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CarrierLinkRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CarrierMessage' }
        '400':
          description: Bad Request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /v1/carrier/messages/{id}/links:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: List link audit entries for a carrier message
      operationId: ListCarrierMessageLinks
      parameters:
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  links:
                    type: array
                    items: { $ref: '#/components/schemas/CarrierMessageLinkAudit' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /v1/admin/carrier_message_links:
    get:
      summary: Admin search for carrier message link audit entries
      operationId: AdminListCarrierMessageLinks
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: actor
          description: Filter audit entries by actor identity (exact match)
          schema: { type: string }
        - in: query
          name: limit
          description: Maximum number of audit entries to return (default server-side limit applies)
          schema: { type: integer }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  links:
                    type: array
                    items: { $ref: '#/components/schemas/CarrierMessageLinkAudit' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /v1/conversations:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateConversationRequest' }
      responses:
        '201':
          description: Created
    get:
      responses:
        '200':
          description: OK
  /v1/conversations/{id}:
    get:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
  /v1/messages:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SendMessageRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SendMessageResponse' }
        '202':
          description: Accepted and queued for persistence
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SendMessageResponse' }
  /v1/messages/phone:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SendPhoneMessageRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SendPhoneMessageResponse' }
        '202':
          description: Accepted and queued for persistence
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SendPhoneMessageResponse' }
  /v1/ws:
    get:
      summary: WebSocket gateway endpoint
      description: >
        Upgrade this request to WebSocket. Authenticate with `access_token` query parameter
        or `Authorization: Bearer <token>` header during upgrade handshake.
      parameters:
        - in: query
          name: access_token
          required: false
          schema: { type: string }
      responses:
        '101':
          description: Switching Protocols
  /v1/conversations/{id}/messages:
    get:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
  /v1/conversations/{id}/read:
    post:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '204':
          description: No Content

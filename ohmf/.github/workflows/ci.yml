name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Ensure go.mod tidy
        run: |
          go mod tidy

      - name: Run gofmt check
        run: |
          fmt_out=$(gofmt -l .) || true
          if [ -n "$fmt_out" ]; then
            echo "gofmt needs to be run on the following files:"; echo "$fmt_out"; exit 1
          fi

      - name: Build all packages (only packages with Go files)
        run: |
          set -e
          echo "Discovering buildable packages..."
          pkgs=$(go list -f "{{if .GoFiles}}{{.ImportPath}}{{end}}" ./... | sed '/^$/d')
          if [ -z "$pkgs" ]; then
            echo "No buildable packages found; skipping build."
            exit 0
          fi
          echo "$pkgs" | xargs -n1 -I{} sh -c 'echo "== Building {} =="; go build {}'

      - name: Run go vet (only packages with Go files)
        run: |
          echo "Discovering packages for vet..."
          pkgs=$(go list -f "{{if .GoFiles}}{{.ImportPath}}{{end}}" ./... | sed '/^$/d')
          if [ -z "$pkgs" ]; then
            echo "No packages for vet; skipping."
            exit 0
          fi
          echo "$pkgs" | xargs -n1 -I{} sh -c 'echo "== Vetting {} =="; go vet {}'

  integration:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Run integration tests (dockerized Postgres)
        run: |
          set -euo pipefail
          bash ./scripts/run-tests.sh --integration

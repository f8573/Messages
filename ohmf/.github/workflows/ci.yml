name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Ensure go.mod tidy
        run: |
          go mod tidy

      - name: Run gofmt check
        run: |
          fmt_out=$(gofmt -l .) || true
          if [ -n "$fmt_out" ]; then
            echo "gofmt needs to be run on the following files:"; echo "$fmt_out"; exit 1
          fi

      - name: Build all packages
        run: |
          set -e
          go build ./...

      - name: Run go vet
        run: |
          go vet ./...
